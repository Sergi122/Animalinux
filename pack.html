<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>AnimaLinux Community — nos mudamos</title>
<style>
  body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#1e1e2e;color:#cdd6f4;
       display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;}

</style>
</head>
<body>
  <div>
    <p id="msg">Esta web se mudó, redirigiendo…</p>

    window.location.replace(dest);
